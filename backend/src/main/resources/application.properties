spring.application.name=todo-cloud
server.port=8080
spring.datasource.url=jdbc:mysql:///${DB_NAME:todo_db}?cloudSqlInstance=${CLOUD_SQL_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.mysql.SocketFactory&useSSL=false
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
app.jwtSecret=dm9jYW90YW5OZ29jZGVwdHJhaWhvbkRpbmhRdW9jRGF0bmhhMTIzMTIz
app.jwtExpirationMs=86400000