server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html index.htm;

    add_header X-Debug-Status "My-Custom-Config-Is-Workinggg";

    # Cấu hình "vàng" để React Router hoạt động khi F5
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tối ưu hóa Cache
    location ~* \.(?:ico|css|js|gif|jpe?g|png)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}